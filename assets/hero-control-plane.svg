<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Mission-control style banner for Mohamed Anwar — Full Stack Developer at Arffy Technologies, product engineering and applied AI, open to full-time roles.</title>
  <defs>
    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="#E9F1FA" opacity="0.06"/>
    </pattern>
    <linearGradient id="gName" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3DDC97"/>
    </linearGradient>
    <linearGradient id="gSweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowCyan">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen">
      <stop offset="0" stop-color="#3DDC97" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3DDC97" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F1726" stop-opacity="1"/>
      <stop offset="1" stop-color="#0F1726" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0F1726" stop-opacity="0"/>
      <stop offset="1" stop-color="#0F1726" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="clipTicker">
      <rect x="32" y="396" width="1136" height="48" rx="12"/>
    </clipPath>
  </defs>
  <style>
    .mn{font-family:Consolas,'SF Mono',Menlo,'Courier New',monospace}
    .sn{font-family:'Segoe UI',-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif}
    .up{letter-spacing:2px}
    .led{animation:pulse 2.8s ease-in-out infinite alternate}
    .d1{animation-delay:.4s}.d2{animation-delay:.9s}.d3{animation-delay:1.5s}.d4{animation-delay:2.1s}.d5{animation-delay:.6s}
    .caret{animation:blink 1.3s steps(1) infinite}
    .pkt{animation-name:travel;animation-timing-function:linear;animation-iteration-count:infinite}
    .p6{animation-duration:6s;animation-delay:-2.2s}
    .p7{animation-duration:7s;animation-delay:-4.6s}
    .p9{animation-duration:9s;animation-delay:-1.4s}
    .sweep{transform-box:view-box;transform-origin:1090px 240px;animation:spin 12s linear infinite}
    .ticker{animation:slide 45s linear infinite}
    @keyframes pulse{from{opacity:.55}to{opacity:1}}
    @keyframes blink{50%{opacity:0}}
    @keyframes travel{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slide{to{transform:translateX(-1144px)}}
    @media (prefers-reduced-motion: reduce){
      *{animation:none !important}
      .m{opacity:0}
    }
  </style>

  <g id="card">
    <rect x="0" y="0" width="1200" height="460" rx="24" fill="#05080F"/>
    <rect x="0" y="0" width="1200" height="460" rx="24" fill="url(#dotGrid)"/>
    <rect x="0.5" y="0.5" width="1199" height="459" rx="23.5" fill="none" stroke="#1D2A40"/>
    <g id="hud-brackets" fill="none" stroke="#2B3D5C" stroke-width="1.5">
      <path d="M 34 20 H 20 V 34"/>
      <path d="M 1166 20 H 1180 V 34"/>
      <path d="M 20 426 V 440 H 34"/>
      <path d="M 1180 426 V 440 H 1166"/>
    </g>
    <ellipse cx="290" cy="170" rx="300" ry="110" fill="url(#glowCyan)"/>
  </g>

  <g id="status-bar">
    <line x1="0" y1="56" x2="1200" y2="56" stroke="#1D2A40"/>
    <circle cx="32" cy="28" r="5" fill="#3DDC97"/>
    <circle cx="56" cy="28" r="5" fill="#FFB454"/>
    <circle cx="80" cy="28" r="5" fill="#22D3EE"/>
    <text class="mn up" x="104" y="34" font-size="16" fill="#7D8FA8">ANWR-01 // CONTROL PLANE — TENKASI.IN</text>
    <circle class="led" cx="558" cy="28" r="4" fill="#3DDC97"/>
    <text class="mn" x="572" y="34" font-size="16" fill="#9DB0C9">ALL SYSTEMS NOMINAL</text>
    <rect x="794" y="12" width="374" height="32" rx="6" fill="#0F1726" stroke="#3DDC97"/>
    <text class="mn" x="981" y="34" font-size="16" fill="#3DDC97" text-anchor="middle">STATUS: OPEN TO FULL-TIME ROLES</text>
  </g>

  <g id="identity">
    <text class="sn" x="32" y="156" font-size="64" font-weight="750" letter-spacing="-1.5" fill="url(#gName)">Mohamed Anwar</text>
    <text class="sn" x="32" y="204" font-size="24" font-weight="600" fill="#E9F1FA">Full Stack Developer · Arffy Technologies</text>
    <text class="sn" x="32" y="246" font-size="19" fill="#9DB0C9">Product engineering × applied AI — I turn complex</text>
    <text class="sn" x="32" y="274" font-size="19" fill="#9DB0C9">workflows into dependable products.</text>
    <rect class="caret" x="376" y="256" width="10" height="22" fill="#FFB454"/>
    <text class="mn" x="32" y="334" font-size="18" fill="#7D8FA8">◆ tenkasi, india</text>
    <text class="mn" x="296" y="334" font-size="18" fill="#7D8FA8">◆ open to full-time roles</text>
  </g>

  <g id="topology">
    <g id="conduits" fill="none" stroke="#1D2A40" stroke-width="1.5" stroke-dasharray="2 6" stroke-linecap="round">
      <path d="M 756 160 V 230 H 772"/>
      <path d="M 758 308 V 246 H 772"/>
      <path d="M 900 200 V 158 H 1012"/>
      <path d="M 900 260 V 308"/>
    </g>
    <g id="packets" fill="none" stroke="#22D3EE" stroke-width="3" stroke-linecap="round">
      <path class="pkt p6 m" d="M 756 160 V 230 H 772" pathLength="100" stroke-dasharray="12 88"/>
      <path class="pkt p7 m" d="M 900 200 V 158 H 1012" pathLength="100" stroke-dasharray="7 93"/>
      <path class="pkt p9 m" d="M 758 308 V 246 H 772" pathLength="100" stroke-dasharray="13 87"/>
    </g>

    <g id="node-ui">
      <rect x="676" y="100" width="160" height="60" rx="6" fill="#0F1726" stroke="#1D2A40"/>
      <text class="mn" x="756" y="126" font-size="18" fill="#E9F1FA" text-anchor="middle">node/ui</text>
      <text class="mn" x="756" y="148" font-size="16" fill="#7D8FA8" text-anchor="middle">React</text>
      <circle class="led" cx="822" cy="114" r="4" fill="#3DDC97"/>
    </g>

    <g id="node-api">
      <rect x="772" y="200" width="176" height="60" rx="6" fill="#0F1726" stroke="#1D2A40"/>
      <text class="mn" x="860" y="226" font-size="18" fill="#E9F1FA" text-anchor="middle">svc/api</text>
      <text class="mn" x="860" y="248" font-size="16" fill="#7D8FA8" text-anchor="middle">Nest·FastAPI</text>
      <circle class="led d1" cx="934" cy="214" r="4" fill="#3DDC97"/>
    </g>

    <g id="node-db">
      <rect x="660" y="308" width="196" height="60" rx="6" fill="#0F1726" stroke="#1D2A40"/>
      <text class="mn" x="758" y="334" font-size="18" fill="#E9F1FA" text-anchor="middle">db</text>
      <text class="mn" x="758" y="356" font-size="16" fill="#7D8FA8" text-anchor="middle">pgvector·Mongo</text>
      <circle class="led d2" cx="842" cy="322" r="4" fill="#3DDC97"/>
    </g>

    <g id="node-ai">
      <rect x="1012" y="116" width="156" height="184" rx="6" fill="#0F1726" stroke="#1D2A40"/>
      <text class="mn" x="1090" y="146" font-size="18" fill="#E9F1FA" text-anchor="middle">ai/rag</text>
      <text class="mn" x="1090" y="170" font-size="16" fill="#7D8FA8" text-anchor="middle">LLM·MCP</text>
      <circle class="led d3" cx="1154" cy="130" r="4" fill="#3DDC97"/>
      <g id="radar">
        <circle cx="1090" cy="240" r="52" fill="url(#glowGreen)"/>
        <circle cx="1090" cy="240" r="26" fill="#0A101C" stroke="#1D2A40"/>
        <circle cx="1090" cy="240" r="17" fill="none" stroke="#1D2A40" opacity="0.8"/>
        <circle cx="1090" cy="240" r="9" fill="none" stroke="#1D2A40" opacity="0.6"/>
        <g class="sweep">
          <path d="M 1090 240 L 1116 240 A 26 26 0 0 1 1103 262.52 Z" fill="url(#gSweep)"/>
          <line x1="1090" y1="240" x2="1116" y2="240" stroke="#22D3EE" stroke-width="1.5" opacity="0.9"/>
        </g>
        <circle cx="1090" cy="240" r="2" fill="#22D3EE"/>
      </g>
    </g>

    <g id="node-deploy">
      <rect x="880" y="308" width="144" height="60" rx="6" fill="#0F1726" stroke="#1D2A40"/>
      <text class="mn" x="952" y="334" font-size="18" fill="#E9F1FA" text-anchor="middle">deploy</text>
      <text class="mn" x="952" y="356" font-size="16" fill="#7D8FA8" text-anchor="middle">k8s</text>
      <circle class="led d4" cx="1010" cy="322" r="4" fill="#3DDC97"/>
    </g>
  </g>

  <g id="telemetry">
    <rect x="32" y="396" width="1136" height="48" rx="12" fill="#0F1726" stroke="#1D2A40"/>
    <g clip-path="url(#clipTicker)">
      <g class="ticker">
        <text class="mn" x="44" y="426" font-size="16" fill="#7D8FA8">REACT · ANGULAR · TYPESCRIPT · NESTJS · FASTAPI · DJANGO · POSTGRES · MONGODB · PGVECTOR · RAG · MCP · DOCKER · K8S · </text>
        <text class="mn" x="1188" y="426" font-size="16" fill="#7D8FA8">REACT · ANGULAR · TYPESCRIPT · NESTJS · FASTAPI · DJANGO · POSTGRES · MONGODB · PGVECTOR · RAG · MCP · DOCKER · K8S · </text>
      </g>
      <rect x="32" y="396" width="60" height="48" fill="url(#fadeL)"/>
      <rect x="1108" y="396" width="60" height="48" fill="url(#fadeR)"/>
    </g>
  </g>
</svg>
