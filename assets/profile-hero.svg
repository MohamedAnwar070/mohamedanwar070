<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohamed Anwar - Full Stack Developer</title>
  <desc id="desc">A custom developer banner showing Mohamed Anwar's end-to-end build path from interface to deployment.</desc>

  <defs>
    <linearGradient id="background" x1="45" y1="16" x2="1145" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1B2B"/>
      <stop offset="1" stop-color="#102A38"/>
    </linearGradient>
    <linearGradient id="accent" x1="90" y1="80" x2="655" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1035 50) rotate(126) scale(300 350)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#94A3B8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#background)" stroke="#1E3A4B" stroke-width="2"/>
  <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="358" rx="28" fill="url(#glow)"/>

  <circle cx="60" cy="48" r="5" fill="#FB7185"/>
  <circle cx="78" cy="48" r="5" fill="#FBBF24"/>
  <circle cx="96" cy="48" r="5" fill="#34D399"/>
  <text x="116" y="53" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="1.5">PROFILE / BUILD SYSTEMS THAT SHIP</text>

  <rect x="62" y="91" width="335" height="30" rx="15" fill="#0F2C36" stroke="#1D5760"/>
  <circle cx="80" cy="106" r="4" fill="#5EEAD4"/>
  <text x="94" y="111" fill="#99F6E4" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1.6">FULL-STACK · AI SYSTEMS · DEVOPS</text>

  <text x="58" y="188" fill="url(#accent)" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="750" letter-spacing="-2">Mohamed Anwar</text>
  <text x="62" y="230" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="500">I turn complex workflows into dependable products.</text>
  <text x="62" y="269" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="17">React · NestJS · FastAPI · RAG · Docker · Kubernetes</text>

  <rect x="62" y="300" width="8" height="8" rx="2" transform="rotate(45 62 300)" fill="#38BDF8"/>
  <text x="82" y="310" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Tenkasi, India</text>
  <rect x="202" y="300" width="8" height="8" rx="2" transform="rotate(45 202 300)" fill="#5EEAD4"/>
  <text x="222" y="310" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="14">Open to full-time roles</text>

  <g filter="url(#shadow)">
    <rect x="804" y="48" width="328" height="266" rx="22" fill="#071521" stroke="#284558"/>
    <text x="830" y="80" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="12" letter-spacing="1.8">END-TO-END BUILD PATH</text>
    <line x1="851" y1="110" x2="851" y2="274" stroke="url(#line)" stroke-width="2" stroke-dasharray="3 6"/>

    <circle cx="851" cy="120" r="8" fill="#5EEAD4"/>
    <rect x="879" y="100" width="220" height="40" rx="10" fill="#0D2530" stroke="#1F4B55"/>
    <text x="896" y="125" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">01  Interface</text>
    <text x="1014" y="125" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="11">React</text>

    <circle cx="851" cy="170" r="8" fill="#2DD4BF"/>
    <rect x="879" y="150" width="220" height="40" rx="10" fill="#0D2530" stroke="#1F4B55"/>
    <text x="896" y="175" fill="#CCFBF1" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">02  Services</text>
    <text x="1011" y="175" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="11">Nest / API</text>

    <circle cx="851" cy="220" r="8" fill="#38BDF8"/>
    <rect x="879" y="200" width="220" height="40" rx="10" fill="#0D2530" stroke="#1F4B55"/>
    <text x="896" y="225" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">03  Intelligence</text>
    <text x="1023" y="225" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="11">RAG / LLM</text>

    <circle cx="851" cy="270" r="8" fill="#FBBF24"/>
    <rect x="879" y="250" width="220" height="40" rx="10" fill="#0D2530" stroke="#1F4B55"/>
    <text x="896" y="275" fill="#FEF3C7" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">04  Delivery</text>
    <text x="1004" y="275" fill="#64748B" font-family="Consolas, Menlo, monospace" font-size="11">Docker / K8s</text>
  </g>
</svg>
